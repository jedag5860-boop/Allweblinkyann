    <!-- Main App -->
    <div class="main-app" id="mainApp">

        <!-- Grid Cards -->

    <!-- Sidebar (Admin Only) -->

            <label for="cardTitle">Judul / Teks</label>

    <!-- Script utama aplikasi -->

    <!-- Script partikel (efek kunang-kunang) -->
    <script>
        // Particle effect - kunang-kunang putih bergerak
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function initParticles() {
            particles = [];
            const particleCount = 100; // jumlah partikel
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 3 + 1, // ukuran 1-4px
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5,
                    opacity: Math.random() * 0.8 + 0.2,
                    flicker: Math.random() * 0.05 + 0.95 // faktor kedip
                });
            }
        }

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initParticles();
        }

        function updateParticles() {
            for (let p of particles) {
                // Gerakan
                p.x += p.speedX;
                p.y += p.speedY;

                // Pantul jika keluar layar (atau muncul di sisi lain)
                if (p.x < 0) p.x = width;
                if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height;
                if (p.y > height) p.y = 0;

                // Efek kedip (ubah opacity sedikit)
                p.opacity += (Math.random() - 0.5) * 0.02;
                if (p.opacity < 0.2) p.opacity = 0.2;
                if (p.opacity > 1) p.opacity = 1;
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'white';
            for (let p of particles) {
                ctx.globalAlpha = p.opacity;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(animate);
        }

        function animate() {
            updateParticles();
            drawParticles();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        animate();
    </script>
</body>
